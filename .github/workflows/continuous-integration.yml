on:
  push:
    branches:
      - main
  pull_request:

jobs:
  debian-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run configuration script
        run: ./scripts/debian/configure-dotfiles.sh

      - name: Verify home-manager is installed
        run: |
          if ! command -v home-manager &> /dev/null; then
            echo "home-manager could not be found"
            exit 1
          fi

  nixos-laptop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run laptop configuration script
        run: nix-build '<nixpkgs/nixos>' -A system -I nixos-config=./systems/laptop/configuration.nix --dry-run

  nixos-server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run laptop configuration script
        run: nix-build '<nixpkgs/nixos>' -A system -I nixos-config=./systems/server/configuration.nix --dry-run
